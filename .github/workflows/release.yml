name: Release & Export

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${ matrix.bin } - ${ matrix.target })
    runs-on: ${ matrix.os }
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: tp
            features: ""
            export_libs: false
            package: true
            docker: false
            use_cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            bin: tp
            features: ""
            export_libs: false
            package: true
            docker: false
            use_cross: true
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            bin: tp
            features: ""
            export_libs: false
            package: true
            docker: false
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            bin: tp
            features: ""
            export_libs: false
            package: true
            docker: false
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: tp
            features: ""
            export_libs: false
            package: true
            docker: false
            use_cross: false
          - target: i686-pc-windows-msvc
            os: windows-latest
            bin: tp
            features: ""
            export_libs: false
            package: true
            docker: false
            use_cross: true
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            bin: tp
            features: ""
            export_libs: false
            package: true
            docker: false
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            bin: tp
            features: ""
            export_libs: false
            package: true
            docker: false
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: tp
            features: ""
            export_libs: false
            package: true
            docker: false
            use_cross: false
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Refinery Build
        uses: sircesarium/refinery-rs@v2.0
        with:
          target: ${ matrix.target }
          binary-name: ${ matrix.bin }
          features: ${ matrix.features }
          export-libs: ${ matrix.export_libs }
          package: ${ matrix.package }
          publish-docker: ${ matrix.docker }
          use-cross: ${ matrix.use_cross }
          github-token: ${ secrets.GITHUB_TOKEN }

  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
